<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BDO Boss Timer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

body, html {
    margin: 0;
    padding: 0;
    background: #0f0f0f;
    color: white;
    font-family: 'Roboto', sans-serif;
    height: 100vh;
    overflow: hidden;
}

/* draggable & scalable wrapper */
#scale-wrapper {
    position: absolute;
    cursor: move;
    overflow: visible;
    min-width: 50px;
    min-height: 50px;
    transform-origin: top left;
}

/* main container inside wrapper */
.container {
    width: 320px;
    text-align: center;
    padding: 10px;
}

/* title */
.title {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 15px;
}

/* boss icons */
.boss-row {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 15px;
}
.boss-icon {
    width: 160px;
    height: 160px;
    object-fit: contain;
    background: #1a1a1a;
    border-radius: 100px;
    padding: 8px;
}

/* countdown */
.countdown {
    font-size: 56px;
    font-weight: 700;
    margin: 10px 0;
    color: #49c57a;
}

/* boss names */
.boss-names {
    font-size: 22px;
    font-weight: 700;
}

/* scale handle */
#scale-handle {
    width: 5px;
    height: 5px;
    background: #49c57a;
    position: absolute;
    bottom: 0;
    right: 0;
    cursor: se-resize;
    border-radius: 4px;
}
</style>
</head>
<body>

<div id="scale-wrapper">
    <div class="container">
        <div class="title">Next Boss</div>
        <div id="boss-icons" class="boss-row"></div>
        <div id="countdown" class="countdown">00:00:00</div>
        <div id="boss-names" class="boss-names"></div>
    </div>
    <div id="scale-handle"></div>
</div>

<script type="module">
import { schedule, IMG_BASE, imgMap } from './schedule.js';

/* boss colors */
const bossColors = {
    "Uturi": "#3bd16f", "Kutum": "#7a7aff", "Sangoon": "#2ecc71",
    "Karanda": "#3498db", "Golden Pig King": "#f1c40f", "Nouver": "#ff7f27",
    "Bulgasal": "#ff4040", "Kzarka": "#ff4040", "Offin": "#2ecc71",
    "Garmoth": "#ff4040", "Vell": "#2dd4bf", "Black Shadow": "#ffffff",
    "Quint": "#ffa36c", "Muraka": "#ffffff"
};

/* next bosses calculation */
function getNextBosses() {
    const now = new Date();
    const currentDay = now.getDay() || 7;
    let candidates = [];

    schedule.forEach(slot => {
        const [h, m] = slot.time.split(":").map(Number);
        let spawn = new Date(now);
        spawn.setHours(h, m, 0, 0);
        spawn.setDate(now.getDate() + (slot.day - currentDay));
        if (spawn < now) spawn.setDate(spawn.getDate() + 7);
        candidates.push({ time: spawn, diff: spawn - now, bosses: slot.bosses });
    });

    candidates.sort((a, b) => a.diff - b.diff);
    return candidates.slice(0,5);
}

/* render boss icons */
function renderBossIcons(bosses) {
    const container = document.getElementById("boss-icons");
    container.innerHTML = "";
    bosses.forEach(boss => {
        const img = document.createElement("img");
        img.src = IMG_BASE + imgMap[boss];
        img.className = "boss-icon";
        img.style.border = "5px solid " + (bossColors[boss] || "#888");
        img.title = boss;
        container.appendChild(img);
    });
}

/* update timer */
function update() {
    const next = getNextBosses();
    if (!next.length) return;
    const current = next[0];

    renderBossIcons(current.bosses);

    const seconds = Math.floor(current.diff / 1000);
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = seconds % 60;

    document.getElementById("countdown").innerText =
        String(h).padStart(2,"0") + ":" +
        String(m).padStart(2,"0") + ":" +
        String(s).padStart(2,"0");

    const names = current.bosses.map(boss => {
        const color = bossColors[boss] || "#fff";
        return `<span style="color:${color}">${boss}</span>`;
    }).join(" | ");
    document.getElementById("boss-names").innerHTML = names;
}

setInterval(update, 1000);
update();

/* dragging logic with persistence */
const wrapper = document.getElementById("scale-wrapper");
let isDragging = false;
let offsetX, offsetY;

// restore saved position
let savedPos = JSON.parse(localStorage.getItem("bossTimerPosition"));
if (savedPos) {
    wrapper.style.left = savedPos.left + "px";
    wrapper.style.top = savedPos.top + "px";
} else {
    wrapper.style.left = "50px";
    wrapper.style.top = "50px";
}

wrapper.addEventListener("mousedown", (e) => {
    if (e.target === wrapper || e.target.closest(".container")) {
        isDragging = true;
        offsetX = e.clientX - wrapper.offsetLeft;
        offsetY = e.clientY - wrapper.offsetTop;
        wrapper.style.cursor = "grabbing";
    }
});

document.addEventListener("mousemove", (e) => {
    if (!isDragging) return;
    wrapper.style.left = e.clientX - offsetX + "px";
    wrapper.style.top = e.clientY - offsetY + "px";
});

document.addEventListener("mouseup", () => {
    if (isDragging) {
        // save position
        localStorage.setItem("bossTimerPosition", JSON.stringify({
            left: wrapper.offsetLeft,
            top: wrapper.offsetTop
        }));
    }
    isDragging = false;
    wrapper.style.cursor = "move";
});

/* scaling logic with persistence */
const handle = document.getElementById("scale-handle");
let isScaling = false;
let startX, startY, startScale = 1;
const containerEl = wrapper.querySelector(".container");
const minWidth = 50;  // minimum allowed width
const minHeight = 50; // minimum allowed height

// load saved scale
let savedScale = localStorage.getItem("bossTimerScale");
if (savedScale) {
    wrapper.style.transform = `scale(${savedScale})`;
}

handle.addEventListener("mousedown", (e) => {
    e.stopPropagation();
    isScaling = true;
    startX = e.clientX;
    startY = e.clientY;
    const style = window.getComputedStyle(wrapper);
    const transform = style.transform || "none";
    startScale = transform !== "none" && transform !== "matrix(1, 0, 0, 1, 0, 0)"
        ? parseFloat(transform.split('(')[1].split(')')[0].split(',')[0])
        : 1;
});

document.addEventListener("mousemove", (e) => {
    if (!isScaling) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    const delta = Math.max(dx, dy) * 0.01;
    let newScale = startScale + delta;

    // enforce minimum size
    const scaledWidth = containerEl.offsetWidth * newScale;
    const scaledHeight = containerEl.offsetHeight * newScale;
    if (scaledWidth < minWidth) newScale = minWidth / containerEl.offsetWidth;
    if (scaledHeight < minHeight) newScale = minHeight / containerEl.offsetHeight;

    wrapper.style.transform = `scale(${newScale})`;
    localStorage.setItem("bossTimerScale", newScale);
});

document.addEventListener("mouseup", () => {
    isScaling = false;
});
</script>
</body>
</html>
